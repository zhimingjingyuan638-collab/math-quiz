<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数学 問題集</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f4f6ff;
      min-height: 100vh;
      color: #1e1b4b;
      overflow-x: hidden;
    }

    /* ── 浮遊記号 ── */
    .math-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .math-bg span {
      position: absolute; font-weight: 900; opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(105vh) rotate(0deg);   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translateY(-8vh) rotate(360deg); opacity: 0; }
    }

    /* ═══════════════════════════════════
       ホーム画面
    ═══════════════════════════════════ */
    .hero {
      position: relative; z-index: 1;
      background: linear-gradient(135deg, #6d28d9 0%, #4f46e5 40%, #0ea5e9 100%);
      color: #fff; text-align: center;
      padding: 56px 24px 48px;
      clip-path: ellipse(110% 100% at 50% 0%);
      margin-bottom: 8px;
    }
    .hero-icon { font-size: 64px; animation: pulse 2.4s ease-in-out infinite; display: block; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    .hero h1 { font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 900; margin-top: 12px; text-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .hero p { opacity: 0.85; margin-top: 6px; font-size: 1rem; }

    .stats-bar {
      position: relative; z-index: 1;
      display: flex; justify-content: center; gap: 24px;
      padding: 20px 24px 0;
    }
    .stat { text-align: center; background: #fff; border-radius: 14px; padding: 14px 24px; box-shadow: 0 2px 12px rgba(99,102,241,0.12); border: 1.5px solid #e0e7ff; }
    .stat-num { font-size: 1.5rem; font-weight: 900; color: #4f46e5; }
    .stat-label { font-size: 0.72rem; color: #6b7280; margin-top: 2px; }

    .filter-bar {
      position: relative; z-index: 1;
      display: flex; gap: 8px; justify-content: center;
      flex-wrap: wrap; padding: 28px 24px 16px;
    }
    .filter-btn {
      padding: 8px 22px; border-radius: 99px;
      font-weight: 700; font-size: 0.85rem; font-family: inherit;
      border: 2px solid #c7d2fe; background: #fff; color: #6366f1;
      cursor: pointer; transition: all 0.18s;
    }
    .filter-btn:hover { border-color: #6366f1; background: #eef2ff; }
    .filter-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; box-shadow: 0 4px 14px rgba(79,70,229,0.35); }

    .chapter-group { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 4px 24px 32px; }
    .chapter-heading { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #e0e7ff; }
    .chapter-heading-text { font-size: 1rem; font-weight: 900; color: #4338ca; }
    .chapter-badge { font-size: 0.7rem; font-weight: 700; color: #6366f1; background: #eef2ff; padding: 3px 10px; border-radius: 99px; border: 1px solid #c7d2fe; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 20px; }

    .unit-card {
      background: #fff; border-radius: 20px; padding: 14px 16px;
      border: 2px solid #e0e7ff; box-shadow: 0 4px 16px rgba(99,102,241,0.08);
      transition: transform 0.22s, box-shadow 0.22s, border-color 0.22s;
      animation: cardIn 0.45s ease-out both;
      cursor: pointer; display: flex; flex-direction: column; gap: 10px;
      position: relative; overflow: hidden;
    }

    /* ── 難易度 ── */
/* ── クリアバッジ ── */
    .clear-badge {
      position: absolute; bottom: 14px; right: 14px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff; border-radius: 99px;
      padding: 4px 10px; font-size: 0.72rem; font-weight: 900;
      display: flex; align-items: center; gap: 3px;
      box-shadow: 0 2px 8px rgba(245,158,11,0.45);
      animation: badgeIn 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes badgeIn { from{opacity:0;transform:scale(0.7);} to{opacity:1;transform:scale(1);} }
    .unit-card:hover { transform: translateY(-6px) scale(1.015); box-shadow: 0 16px 40px rgba(99,102,241,0.2); border-color: #818cf8; }
    @keyframes cardIn { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    .card-top { display: flex; align-items: center; gap: 12px; }
    .card-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; background: linear-gradient(135deg, #ede9fe, #dbeafe); border: 1.5px solid #c7d2fe; flex-shrink: 0; }
    .card-badge { font-size: 0.72rem; font-weight: 700; padding: 4px 10px; border-radius: 99px; background: #ede9fe; color: #6d28d9; white-space: nowrap; }
    .card-title { font-size: 1.05rem; font-weight: 800; color: #1e1b4b; line-height: 1.45; }
    .card-count { font-size: 0.8rem; color: #9ca3af; margin-top: 2px; }
    .start-btn { margin-top: auto; width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; font-size: 0.95rem; font-weight: 800; background: linear-gradient(135deg, #6d28d9, #4f46e5, #0ea5e9); color: #fff; box-shadow: 0 4px 14px rgba(79,70,229,0.35); transition: opacity 0.18s, transform 0.15s; }
    .start-btn:hover { opacity: 0.88; transform: scale(1.02); }
    .start-btn:active { transform: scale(0.97); }

    footer { position: relative; z-index: 1; text-align: center; padding: 20px; color: #9ca3af; font-size: 0.8rem; border-top: 1px solid #e0e7ff; }
    .hidden { display: none !important; }
    .empty { text-align: center; padding: 80px 24px; color: #9ca3af; }

    /* ═══════════════════════════════════
       クイズ画面共通ヘッダー
    ═══════════════════════════════════ */
    .quiz-header {
      position: relative; z-index: 10;
      background: linear-gradient(135deg, #6d28d9 0%, #4f46e5 50%, #0ea5e9 100%);
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      box-shadow: 0 2px 16px rgba(79,70,229,0.25);
    }
    .back-btn {
      background: rgba(255,255,255,0.2); border: 1.5px solid rgba(255,255,255,0.35);
      color: #fff; font-family: inherit; font-size: 0.85rem; font-weight: 700;
      padding: 7px 14px; border-radius: 99px; cursor: pointer; transition: background 0.18s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.3); }
    .quiz-header-title { flex: 1; text-align: center; font-weight: 800; font-size: 0.9rem; color: #fff; padding: 0 10px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .header-count { color: rgba(255,255,255,0.8); font-size: 0.85rem; font-weight: 700; white-space: nowrap; }

    .timer-display {
      display: none;
      background: rgba(0,0,0,0.25); border-radius: 99px; padding: 5px 14px;
      font-size: 1rem; font-weight: 900; color: #fff;
      font-variant-numeric: tabular-nums; letter-spacing: 0.04em; white-space: nowrap;
    }
    .timer-display.running { display: block; animation: timerPulse 1s ease-in-out infinite alternate; }
    @keyframes timerPulse {
      from { background: rgba(0,0,0,0.25); }
      to   { background: rgba(255,200,0,0.25); }
    }

    .progress-wrap { position: relative; z-index: 10; height: 6px; background: #e0e7ff; }
    .progress-fill { height: 100%; border-radius: 0 4px 4px 0; background: linear-gradient(90deg, #7c3aed, #4f46e5, #0ea5e9); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 8px rgba(79,70,229,0.4); }

    /* ═══════════════════════════════════
       モード選択
    ═══════════════════════════════════ */
    .mode-screen { animation: zoomIn 0.4s cubic-bezier(0.4,0,0.2,1); }
    .mode-card { background: #fff; border-radius: 24px; padding: 38px 28px; border: 2px solid #e0e7ff; box-shadow: 0 8px 32px rgba(99,102,241,0.12); text-align: center; }
    .mode-title { font-size: 1.3rem; font-weight: 900; color: #1e1b4b; margin-bottom: 6px; }
    .mode-sub   { color: #6b7280; font-size: 0.9rem; margin-bottom: 32px; }
    .mode-btns  { display: flex; flex-direction: column; gap: 14px; }
    @media(min-width:440px){ .mode-btns{ flex-direction: row; } }
    .mode-btn { flex: 1; padding: 22px 16px; border-radius: 18px; border: 2.5px solid #e0e7ff; cursor: pointer; font-family: inherit; font-weight: 900; background: #f8f9ff; color: #1e1b4b; transition: all 0.18s; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .mode-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(99,102,241,0.2); }
    .mode-btn .mode-icon { font-size: 2.2rem; }
    .mode-btn .mode-name { font-size: 1.05rem; }
    .mode-btn .mode-desc { font-size: 0.75rem; font-weight: 500; color: #6b7280; }
    .mode-btn.normal:hover     { border-color: #4f46e5; background: #ede9fe; }
    .mode-btn.timeattack:hover { border-color: #f59e0b; background: #fffbeb; }
    .mode-btn.timeattack { border-color: #fcd34d; background: linear-gradient(135deg, #fffbeb, #fff); }
    .mode-btn.timeattack .mode-name { color: #d97706; }

    /* ═══════════════════════════════════
       クイズカード
    ═══════════════════════════════════ */
    .quiz-main { flex: 1; position: relative; z-index: 1; max-width: 660px; width: 100%; margin: 0 auto; padding: 28px 18px; }
    .quiz-card { background: #fff; border-radius: 24px; padding: 36px 30px; border: 2px solid #e0e7ff; box-shadow: 0 8px 32px rgba(99,102,241,0.12); animation: slideIn 0.35s cubic-bezier(0.4,0,0.2,1); }
    .quiz-card.timeattack-mode { border-top: 4px solid #f59e0b; }
    @keyframes slideIn { from{opacity:0;transform:translateX(28px);} to{opacity:1;transform:translateX(0);} }
    .q-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em; color: #7c3aed; text-transform: uppercase; margin-bottom: 14px; }
    .q-text  { font-size: clamp(1.4rem,4vw,2rem); font-weight: 900; color: #1e1b4b; line-height: 1.5; margin-bottom: 28px; }

    .choices { display: flex; flex-direction: column; gap: 11px; }
    .choice-btn { display: flex; align-items: center; gap: 14px; padding: 15px 18px; border-radius: 14px; width: 100%; text-align: left; font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; background: #f8f9ff; border: 2px solid #e0e7ff; color: #1e1b4b; opacity: 0; animation: choiceIn 0.3s ease-out forwards; transition: transform 0.14s, border-color 0.16s, background 0.16s, box-shadow 0.16s; }
    .choice-btn:hover:not(:disabled) { background: #ede9fe; border-color: #7c3aed; transform: translateX(6px); box-shadow: 0 4px 16px rgba(124,58,237,0.15); }
    @keyframes choiceIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
    .choice-label { width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 900; background: #e0e7ff; color: #4f46e5; transition: background 0.18s, color 0.18s; }
    .choice-btn.correct { background: #d1fae5; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.2); animation: correctPop 0.35s ease-out; }
    .choice-btn.correct .choice-label { background: #10b981; color: #fff; }
    @keyframes correctPop { 0%{transform:scale(0.97);} 55%{transform:scale(1.04);} 100%{transform:scale(1);} }
    .choice-btn.wrong { background: #fee2e2; border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,0.18); animation: shake 0.38s ease-out; }
    .choice-btn.wrong .choice-label { background: #ef4444; color: #fff; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-5px);} 80%{transform:translateX(5px);} }
    .choice-btn.dimmed { opacity: 0.35; }

    .hint-box { display: none; margin-top: 18px; padding: 14px 16px; border-radius: 12px; background: #fffbeb; border: 1.5px solid #fcd34d; }
    .hint-box.show { display: block; animation: fadeIn 0.28s ease-out; }
    .hint-label { font-size: 0.72rem; font-weight: 800; color: #d97706; margin-bottom: 4px; }
    .hint-text  { font-size: 0.9rem; color: #92400e; }

    .next-btn { display: none; margin-top: 22px; width: 100%; padding: 15px; border-radius: 14px; border: none; cursor: pointer; font-family: inherit; font-size: 1rem; font-weight: 900; background: linear-gradient(135deg,#6d28d9,#4f46e5,#0ea5e9); color: #fff; box-shadow: 0 4px 18px rgba(79,70,229,0.35); transition: opacity 0.18s, transform 0.14s; animation: fadeIn 0.3s ease-out; }
    .next-btn.show { display: block; }
    .next-btn:hover { opacity: 0.88; transform: scale(1.01); }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* ═══════════════════════════════════
       花火
    ═══════════════════════════════════ */
    #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 200; }

    /* ═══════════════════════════════════
       結果画面
    ═══════════════════════════════════ */
    .result-screen { display: none; animation: zoomIn 0.45s cubic-bezier(0.4,0,0.2,1); }
    @keyframes zoomIn { from{opacity:0;transform:scale(0.88);} to{opacity:1;transform:scale(1);} }
    .result-card { background: #fff; border-radius: 24px; padding: 44px 28px; border: 2px solid #e0e7ff; box-shadow: 0 8px 40px rgba(99,102,241,0.14); text-align: center; }
    .result-emoji { font-size: 72px; animation: bounceIn 0.7s ease-out; display: block; margin-bottom: 14px; }
    @keyframes bounceIn { 0%{transform:scale(0.3) translateY(-20px);opacity:0;} 60%{transform:scale(1.1);} 100%{transform:scale(1);opacity:1;} }
    .result-title { font-size: 1.8rem; font-weight: 900; color: #1e1b4b; margin-bottom: 6px; }
    .result-msg   { color: #6b7280; margin-bottom: 28px; }

    .score-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 28px; }
    .score-box  { border-radius: 16px; padding: 18px 10px; border: 2px solid #e0e7ff; background: #f8f9ff; }
    .score-num      { font-size: 2rem; font-weight: 900; }
    .score-num.pct  { color: #4f46e5; }
    .score-num.ok   { color: #10b981; }
    .score-num.ng   { color: #ef4444; }
    .score-label    { font-size: 0.73rem; color: #9ca3af; margin-top: 4px; }

    .time-result-box { margin-bottom: 24px; padding: 24px 20px; border-radius: 20px; background: linear-gradient(135deg,#fffbeb,#fef3c7); border: 2.5px solid #fcd34d; }
    .time-result-label { font-size: 0.8rem; font-weight: 800; color: #d97706; margin-bottom: 4px; letter-spacing: 0.08em; }
    .time-result-value { font-size: 2.8rem; font-weight: 900; color: #92400e; font-variant-numeric: tabular-nums; }
    .time-result-sub   { font-size: 0.8rem; color: #b45309; margin-top: 4px; }

    .score-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }

    .result-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
    @media(min-width:440px){ .result-btns{ flex-direction: row; } }
    .btn-retry { flex: 1; padding: 15px; border-radius: 14px; border: none; cursor: pointer; font-family: inherit; font-size: 0.95rem; font-weight: 900; background: linear-gradient(135deg,#6d28d9,#4f46e5,#0ea5e9); color: #fff; box-shadow: 0 4px 16px rgba(79,70,229,0.35); transition: opacity 0.18s, transform 0.14s; }
    .btn-home  { flex: 1; padding: 15px; border-radius: 14px; cursor: pointer; font-family: inherit; font-size: 0.95rem; font-weight: 900; background: #f4f6ff; color: #4f46e5; border: 2px solid #c7d2fe; transition: opacity 0.18s, transform 0.14s; }
    .btn-retry:hover, .btn-home:hover { opacity: 0.86; transform: scale(1.02); }
    .btn-review { width: 100%; padding: 15px; border-radius: 14px; border: none; cursor: pointer; font-family: inherit; font-size: 0.95rem; font-weight: 900; background: linear-gradient(135deg,#059669,#10b981); color: #fff; box-shadow: 0 4px 16px rgba(16,185,129,0.35); transition: opacity 0.18s, transform 0.14s; }
    .btn-review:hover { opacity: 0.86; transform: scale(1.02); }
    .result-row-btns { display: flex; gap: 10px; }

    /* ── 分数表示 ── */
    .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 1px; font-size: 0.82em; line-height: 1.15; }
    .frac-num { border-bottom: 1.5px solid currentColor; padding: 0 3px 1px; text-align: center; min-width: 1em; }
    .frac-den { padding: 1px 3px 0; text-align: center; min-width: 1em; }

    /* ── 自己ベスト ── */
    .card-best { font-size: 0.78rem; color: #d97706; font-weight: 700; margin-top: 1px; }

    /* ── ストリークトースト ── */
    #streak-toast {
      position: fixed; top: 72px; left: 50%; transform: translateX(-50%) translateY(-12px);
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff; border-radius: 99px; padding: 10px 26px;
      font-size: 1rem; font-weight: 900;
      box-shadow: 0 4px 20px rgba(79,70,229,0.5);
      z-index: 400; opacity: 0; pointer-events: none;
      transition: opacity 0.22s, transform 0.22s;
    }
    #streak-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── カウントダウン ── */
    #countdown-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(79,70,229,0.93);
      display: none; align-items: center; justify-content: center;
    }
    #countdown-overlay.active { display: flex; }
    #countdown-num {
      font-size: 7rem; font-weight: 900; color: #fff;
      text-shadow: 0 0 40px rgba(255,255,255,0.4);
      animation: countPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes countPop { from{transform:scale(1.8);opacity:0;} to{transform:scale(1);opacity:1;} }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>
  <div class="math-bg" id="math-bg"></div>
  <div id="streak-toast"></div>
  <div id="countdown-overlay"><div id="countdown-num"></div></div>

  <!-- ══════════════════════════════════════════
       ホーム画面
  ══════════════════════════════════════════ -->
  <div id="home-screen">
    <header class="hero">
      <span class="hero-icon">📐</span>
      <h1>数学 問題集</h1>
      <p>単元を選んで、くり返し練習しよう ✨</p>
    </header>
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-grade="all" onclick="filterGrade('all')">すべて</button>
    </div>
    <div id="chapter-container"></div>
    <div class="empty hidden" id="empty">📭 この学年の問題はまだありません</div>
    <footer>問題は随時追加されます ✏️</footer>
  </div>

  <!-- ══════════════════════════════════════════
       クイズ画面（モード選択・問題・結果）
  ══════════════════════════════════════════ -->
  <div id="quiz-screen-wrapper" style="display:none; flex-direction:column; min-height:100vh;">
    <header class="quiz-header">
      <button class="back-btn" onclick="goHome()">← ホーム</button>
      <div class="quiz-header-title" id="quiz-header-title"></div>
      <div class="header-right">
        <div class="timer-display" id="timer-display">⏱ 0:00.0</div>
        <div class="header-count" id="header-count"></div>
      </div>
    </header>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div style="flex:1; position:relative; z-index:1; max-width:660px; width:100%; margin:0 auto; padding:28px 18px;">

      <!-- モード選択 -->
      <div class="mode-screen" id="mode-screen" style="display:none;">
        <div class="mode-card">
          <div class="mode-title" id="mode-unit-title"></div>
          <div class="mode-sub">モードを選んでください</div>
          <div class="mode-btns">
            <button class="mode-btn normal" onclick="startQuiz(false)">
              <span class="mode-icon">📖</span>
              <span class="mode-name">通常モード</span>
              <span class="mode-desc">ヒントあり・じっくり学習</span>
            </button>
            <button class="mode-btn timeattack" onclick="startQuiz(true)">
              <span class="mode-icon">⚡</span>
              <span class="mode-name">タイムアタック</span>
              <span class="mode-desc">タイムを計って挑戦！</span>
            </button>
          </div>
        </div>
      </div>

      <!-- クイズ -->
      <div id="quiz-area" style="display:none;">
        <div class="quiz-card" id="quiz-card">
          <div class="q-label" id="q-label"></div>
          <p class="q-text" id="q-text"></p>
          <div class="choices" id="choices"></div>
          <div class="hint-box" id="hint-box">
            <div class="hint-label">💡 ヒント</div>
            <div class="hint-text" id="hint-text"></div>
          </div>

    /* ── 浮遊記号 ── */
    const symbols = ['＋','－','×','÷','＝','²','π','√','∑','△','□','≠'];
    const colors  = ['#a78bfa','#60a5fa','#34d399','#fb923c','#f472b6','#facc15','#6366f1'];
    const bg = document.getElementById('math-bg');
    for (let i = 0; i < 28; i++) {
      const s = document.createElement('span');
      s.textContent = symbols[i % symbols.length];
      s.style.cssText = `left:${Math.random()*100}%;font-size:${18+Math.random()*36}px;color:${colors[~~(Math.random()*colors.length)]};opacity:0;animation-duration:${9+Math.random()*14}s;animation-delay:${-Math.random()*20}s;`;
      bg.appendChild(s);
    }

    /* ── 花火 ── */
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    let parts    = [];
    function resizeC() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resizeC(); addEventListener('resize', resizeC);
    function launchConfetti(x, y) {
      const pal = ['#a78bfa','#60a5fa','#34d399','#fbbf24','#f472b6','#fff','#6366f1'];
      for (let i = 0; i < 70; i++) {
        const a = Math.random()*Math.PI*2, sp = 3+Math.random()*7;
        parts.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-5, r:3+Math.random()*6, color:pal[~~(Math.random()*pal.length)], life:1, decay:0.016+Math.random()*0.012, g:0.2 });
      }
      raf();
    }
    function raf() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      parts = parts.filter(p=>p.life>0);
      parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.life-=p.decay; p.vx*=0.98; ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); });
      ctx.globalAlpha=1;
      if (parts.length) requestAnimationFrame(raf);
    }

    /* ── 分数レンダリング ── */
    function renderMath(str) {
      return str.replace(/\[\[(-?)(\d+)\/(\d+)\]\]/g, (_, sign, num, den) =>
        `<span class="frac"><span class="frac-num">${sign}${num}</span><span class="frac-den">${den}</span></span>`
      );
    }

    /* ── タイマー ── */
    let timerStart = 0, timerInterval = null, elapsedMs = 0;
    let isTimeAttack = false;

    function startTimer() {
      timerStart = performance.now();
      const el = document.getElementById('timer-display');
      el.classList.add('running');
      timerInterval = setInterval(() => {
        elapsedMs = performance.now() - timerStart;
        el.textContent = '⏱ ' + formatTime(elapsedMs);
      }, 100);
    }
    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      elapsedMs = performance.now() - timerStart;
      document.getElementById('timer-display').classList.remove('running');
    }
    function formatTime(ms) {
      const totalSec = ms / 1000;
      const m = Math.floor(totalSec / 60);
      const s = Math.floor(totalSec % 60);
      const d = Math.floor((ms % 1000) / 100);
      return `${m}:${String(s).padStart(2,'0')}.${d}`;
    }

    /* ── クリア記録 ── */
    function getClearCount(unitId) {
      try { return parseInt(localStorage.getItem(`mq_clear_${unitId}`) || '0'); }
      catch(e) { return 0; }
    }
    function incrementClearCount(unitId) {
      try {
        const count = getClearCount(unitId) + 1;
        localStorage.setItem(`mq_clear_${unitId}`, count);
        return count;
      } catch(e) { return 0; }
    }

    function getBestTime(unitId) {
      try { const v = localStorage.getItem(`mq_best_${unitId}`); return v ? parseInt(v) : null; }
      catch(e) { return null; }
    }
    function saveBestTime(unitId, ms) {
      try { localStorage.setItem(`mq_best_${unitId}`, ms); } catch(e) {}
    }

    /* ── 難易度 ── */
    function renderStars(level) {
      return Array.from({length: 3}, (_, i) =>
        `<span class="star ${i < level ? 'filled' : 'empty'}">★</span>`
      ).join('');
    }

    /* ── ホーム画面 ── */
    function renderCards(grade) {
      const container = document.getElementById('chapter-container');
      const empty     = document.getElementById('empty');
      const list = QUIZ_DATA.units.filter(u => grade === 'all' || u.grade === grade);
      if (!list.length) { container.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      const chapterMap = {};
      list.forEach(u => {
        const key = `${u.grade}__${u.chapter || ''}`;
        if (!chapterMap[key]) chapterMap[key] = { grade: u.grade, chapter: u.chapter || '', chapterOrder: u.chapterOrder ?? 99, units: [] };
        chapterMap[key].units.push(u);
      });

      const chapters = Object.values(chapterMap).sort((a,b) => {
        if (a.grade !== b.grade) return a.grade.localeCompare(b.grade);
        return a.chapterOrder - b.chapterOrder;
      });
      chapters.forEach(c => c.units.sort((a,b) => (a.order??99)-(b.order??99)));

      let cardIdx = 0;
      container.innerHTML = chapters.map(chapter => {
        const totalQ = chapter.units.reduce((s,u) => s+u.questions.length, 0);
        const heading = chapter.chapter
          ? `<div class="chapter-heading"><span class="chapter-heading-text">📖 ${chapter.chapter}</span><span class="chapter-badge">${chapter.units.length}単元 · 計${totalQ}問</span></div>`
          : '';
        const cards = chapter.units.map(u => {
          const delay = (cardIdx++ * 0.07).toFixed(2);
          const clearCount = getClearCount(u.id);
          const clearBadge = clearCount > 0
            ? `<div class="clear-badge">🏅 ${clearCount}回クリア</div>`
            : '';
          const best = getBestTime(u.id);
          const bestStr = best !== null ? `<div class="card-best">⏱ ベスト ${formatTime(best)}</div>` : '';
          return `
            <div class="unit-card" style="animation-delay:${delay}s" onclick="selectUnit('${u.id}')">
              <div class="card-top">
                <div class="card-icon">${u.icon}</div>
                <span class="card-badge">${u.grade}</span>
              </div>
              <div><div class="card-title">${u.title}</div><div class="card-count">${u.questions.length}問</div>${bestStr}</div>
              <button class="start-btn">スタート →</button>
              ${clearBadge}
            </div>`;
        }).join('');
        return `<div class="chapter-group">${heading}<div class="grid">${cards}</div></div>`;
      }).join('');
    }

    function buildFilter() {
      const bar = document.getElementById('filter-bar');
      [...new Set(QUIZ_DATA.units.map(u=>u.grade))].sort().forEach(g => {
        const b = document.createElement('button');
        b.className='filter-btn'; b.dataset.grade=g; b.textContent=g;
        b.onclick=()=>filterGrade(g); bar.appendChild(b);
      });
    }
    function filterGrade(grade) {
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.grade===grade));
      renderCards(grade);
    }

    /* ── 画面切り替え ── */
    let currentUnitId = null;

    function selectUnit(id) {
      currentUnitId = id;
      const unit = QUIZ_DATA.units.find(u=>u.id===id);
      document.getElementById('home-screen').style.display = 'none';
      const wrapper = document.getElementById('quiz-screen-wrapper');
      wrapper.style.display = 'flex';
      document.getElementById('quiz-header-title').textContent = unit.title;
      document.getElementById('mode-unit-title').textContent   = unit.title;
      document.getElementById('mode-screen').style.display     = 'block';
      document.getElementById('quiz-area').style.display       = 'none';
      document.getElementById('result-screen').style.display   = 'none';
      document.getElementById('progress-fill').style.width     = '0%';
      document.getElementById('header-count').textContent      = '';
      document.getElementById('timer-display').textContent     = '⏱ 0:00.0';
      document.getElementById('timer-display').classList.remove('running');
      document.getElementById('quiz-card').classList.remove('timeattack-mode');
    }

    function goHome() {
      if (timerInterval) stopTimer();
      document.getElementById('quiz-screen-wrapper').style.display = 'none';

    /* ── ストリーク ── */
    function showStreakToast(n) {
      const msgs = {3:'🔥 3連続正解！', 5:'⚡ 5連続！すごい！', 7:'💥 7連続！止まらない！', 10:'🌟 10連続！完璧！'};
      if (!msgs[n]) return;
      const toast = document.getElementById('streak-toast');
      toast.textContent = msgs[n];
      toast.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    /* ── クイズロジック ── */
    let unit, questions, current, correctCount, answered, hadMistake, streakCount;
    let wrongQuestions = [], isReviewMode = false;
    const LABELS  = ['A','B','C','D'];
    const shuffle = a => [...a].sort(()=>Math.random()-0.5);

    async function startQuiz(timeAttack) {
      isTimeAttack = timeAttack;
      unit = QUIZ_DATA.units.find(u=>u.id===currentUnitId);
      questions = shuffle(unit.questions);
      current = 0; correctCount = 0; streakCount = 0; wrongQuestions = []; isReviewMode = false;

      document.getElementById('mode-screen').style.display = 'none';
      document.getElementById('quiz-area').style.display   = 'block';

      if (isTimeAttack) {
        document.getElementById('quiz-card').classList.add('timeattack-mode');
        await showCountdown();
        startTimer();
      }
      showQuestion();
    }

    function showCountdown() {
      return new Promise(resolve => {
        const overlay = document.getElementById('countdown-overlay');
        const numEl   = document.getElementById('countdown-num');
        overlay.classList.add('active');
        const steps = ['3','2','1','GO!'];
        let i = 0;
        const tick = () => {
          numEl.style.animation = 'none';
          requestAnimationFrame(() => {
            numEl.style.animation = 'countPop 0.4s cubic-bezier(0.34,1.56,0.64,1)';
            numEl.textContent = steps[i];
            numEl.style.color = steps[i] === 'GO!' ? '#fcd34d' : '#fff';
            i++;
            if (i < steps.length) {
              setTimeout(tick, 850);
            } else {
              setTimeout(() => { overlay.classList.remove('active'); resolve(); }, 550);
            }
          });
        };
        tick();
      });
    }

    function showQuestion() {
      answered = false; hadMistake = false;
      const q = questions[current], total = questions.length;
      document.getElementById('header-count').textContent = `${current+1} / ${total}`;
      document.getElementById('q-label').textContent = `問題 ${current+1}`;
      document.getElementById('q-text').innerHTML  = renderMath(q.q);
      document.getElementById('progress-fill').style.width = `${current/total*100}%`;

      const sc = shuffle(q.choices);
      const ci = sc.indexOf(q.correct);

      document.getElementById('choices').innerHTML = sc.map((c,i) =>
        `<button class="choice-btn" id="c${i}" style="animation-delay:${i*0.07}s" onclick="pick(${i},${ci},this)">
          <span class="choice-label">${LABELS[i]}</span><span>${renderMath(c)}</span>
        </button>`
      ).join('');

      document.getElementById('hint-box').classList.remove('show');
      const nb = document.getElementById('next-btn');
      nb.classList.remove('show');
      nb.textContent = current+1 < questions.length
        ? (isTimeAttack ? '次へ →' : '次の問題へ →')
        : (isTimeAttack ? '計測終了 🏁' : '結果を見る 🎉');

      const card = document.getElementById('quiz-card');
      card.style.animation = 'none';
      requestAnimationFrame(()=>{ card.style.animation = 'slideIn 0.35s cubic-bezier(0.4,0,0.2,1)'; });
    }

    function pick(idx, correctIdx, btn) {
      if (answered) return;
      const isCorrect = idx === correctIdx;
      if (isCorrect) {
        answered = true;
        if (!hadMistake) { correctCount++; streakCount++; showStreakToast(streakCount); }
        else { wrongQuestions.push(questions[current]); }
        document.querySelectorAll('.choice-btn').forEach((b,i)=>{
          b.disabled=true;
          if (i===correctIdx) b.classList.add('correct');
          else                b.classList.add('dimmed');
        });
        if (!hadMistake) { const r = btn.getBoundingClientRect(); launchConfetti(r.left+r.width/2, r.top+r.height/2); }
        document.getElementById('hint-box').classList.remove('show');
        setTimeout(()=>document.getElementById('next-btn').classList.add('show'), isTimeAttack ? 150 : 380);
      } else {
        hadMistake = true; streakCount = 0;
        btn.disabled = true;
        btn.classList.add('wrong');
        if (!isTimeAttack) {
          const q = questions[current];
          if (q.hint) { document.getElementById('hint-text').innerHTML = renderMath(q.hint); document.getElementById('hint-box').classList.add('show'); }
        }
      }
    }

    function nextQuestion() {
      current++;
      current < questions.length ? showQuestion() : showResult();
    }

    function showResult() {
      if (isTimeAttack) stopTimer();
      if (!isReviewMode && correctCount === questions.length) incrementClearCount(currentUnitId);

      document.getElementById('quiz-area').style.display        = 'none';
      document.getElementById('result-screen').style.display    = 'block';
      document.getElementById('progress-fill').style.width      = '100%';

      const reviewBtn = document.getElementById('btn-review');
      if (wrongQuestions.length > 0) {
        reviewBtn.classList.remove('hidden');
        reviewBtn.textContent = `間違えた問題を復習 📝（${wrongQuestions.length}問）`;
      } else {
        reviewBtn.classList.add('hidden');
      }

      const total = questions.length;
      const pct   = Math.round(correctCount/total*100);

      if (!isTimeAttack) {
        document.getElementById('normal-result').style.display = 'block';
        document.getElementById('ta-result').style.display     = 'none';

        document.getElementById('result-title-text').textContent = isReviewMode ? '復習完了！' : 'クイズ完了！';
        const emoji = pct>=90?'🏆':pct>=70?'🌟':pct>=50?'📚':'💪';
        const msg   = isReviewMode
          ? (pct===100 ? '全問正解！完璧な復習！🎉' : `${correctCount}/${total}問 正解。もう一度チャレンジ！`)
          : (pct>=90?'完璧！素晴らしい！':pct>=70?'よくできました！':pct>=50?'もう少し！復習しよう。':'繰り返し挑戦しよう！');
        document.getElementById('res-emoji').textContent   = emoji;
        document.getElementById('res-msg').textContent     = msg;
        document.getElementById('res-correct').textContent = correctCount;
        document.getElementById('res-wrong').textContent   = total - correctCount;

        let n = 0; const el = document.getElementById('res-pct');
        const t = setInterval(()=>{ n=Math.min(n+2,pct); el.textContent=n+'%'; if(n>=pct)clearInterval(t); }, 18);

        if (pct>=70) {
          setTimeout(()=>launchConfetti(innerWidth*.3, innerHeight*.35), 150);
          setTimeout(()=>launchConfetti(innerWidth*.7, innerHeight*.35), 400);
          if (pct===100) setTimeout(()=>launchConfetti(innerWidth*.5, innerHeight*.25), 700);
        }

      } else {
        document.getElementById('normal-result').style.display = 'none';
        document.getElementById('ta-result').style.display     = 'block';

        const timeStr  = formatTime(elapsedMs);
        const prevBest = getBestTime(currentUnitId);
        const isNewBest = prevBest === null || elapsedMs < prevBest;
        if (isNewBest) saveBestTime(currentUnitId, elapsedMs);

        document.getElementById('ta-time-value').textContent = timeStr;
        document.getElementById('ta-correct').textContent    = correctCount;
        document.getElementById('ta-wrong').textContent      = total - correctCount;

        const bestBox = document.getElementById('ta-best-box');
        if (prevBest !== null && isNewBest) {
          bestBox.innerHTML = `🎉 新記録！（前回ベスト：${formatTime(prevBest)}）`;
          bestBox.style.cssText = 'display:block; color:#d97706; font-weight:900; margin-bottom:16px; text-align:center; font-size:0.88rem;';
        } else if (!isNewBest) {
          bestBox.innerHTML = `🏅 ベスト：${formatTime(prevBest)}`;
          bestBox.style.cssText = 'display:block; color:#6b7280; font-weight:700; margin-bottom:16px; text-align:center; font-size:0.88rem;';
        } else {
          bestBox.style.display = 'none';
        }

        const msg = pct===100 ? '全問正解！最高のタイムだ！🎉' : pct>=70 ? 'よくできました！次はもっと速く！' : 'まずは全問正解を目指そう！';
        document.getElementById('ta-msg').textContent = msg;
        document.getElementById('ta-emoji').textContent = pct===100 ? '🏆' : pct>=70 ? '⚡' : '💪';

        document.getElementById('btn-retry').textContent = 'もう一度挑戦 ⚡';
        setTimeout(()=>launchConfetti(innerWidth*.3, innerHeight*.35), 200);
        setTimeout(()=>launchConfetti(innerWidth*.7, innerHeight*.35), 450);
      }
    }

    function startReview() {
      isTimeAttack = false; isReviewMode = true;
      questions = shuffle(wrongQuestions);
      wrongQuestions = [];
      current = 0; correctCount = 0; streakCount = 0;

      document.getElementById('quiz-header-title').textContent = unit.title + '（復習）';
      document.getElementById('quiz-card').classList.remove('timeattack-mode');
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('quiz-area').style.display     = 'block';
      document.getElementById('progress-fill').style.width   = '0%';
      document.getElementById('header-count').textContent    = '';
      document.getElementById('btn-retry').textContent       = 'もう一度 🔄';
      showQuestion();
    }

    function retryMode() {
      isReviewMode = false;
      document.getElementById('result-screen').style.display    = 'none';
      document.getElementById('timer-display').textContent      = '⏱ 0:00.0';
      document.getElementById('timer-display').classList.remove('running');
      document.getElementById('quiz-card').classList.remove('timeattack-mode');
      document.getElementById('mode-screen').style.display      = 'block';
      document.getElementById('progress-fill').style.width      = '0%';
      document.getElementById('header-count').textContent       = '';
    }

    /* ── 初期化 ── */
    buildFilter();
    renderCards('all');
  </script>
</body>
</html>
